name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: jarvis-state/go.mod
          cache-dependency-path: jarvis-state/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: jarvis-cal/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('jarvis-cal/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq python3 shellcheck
          # yq
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          # Task (go-task)
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          # BATS
          git clone --branch v1.11.1 --depth 1 \
            https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Clone clift framework
        run: |
          git clone --depth 1 https://github.com/tj-smith47/clift "$HOME/.clift"
          # cmd scripts read CLIFT_FRAMEWORK_DIR via bin/jarvis, but
          # Taskfile.yaml's `includes:` expands {{.FRAMEWORK_DIR}} BEFORE
          # dotenv loads, so the committed `FRAMEWORK_DIR=../..` from .env
          # never reaches go-task at parse time. Set both names so CI
          # matches what `task setup:cli` writes during a real install.
          echo "CLIFT_FRAMEWORK_DIR=$HOME/.clift" >> "$GITHUB_ENV"
          echo "FRAMEWORK_DIR=$HOME/.clift" >> "$GITHUB_ENV"
          echo "CLI_DIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Build native helpers
        # JARVIS_CAL_OFFLINE=0: build_cal.sh defaults to --offline for
        # reproducible local builds; CI only caches jarvis-cal/target, not
        # the cargo registry, so allow network fetch here (documented
        # escape hatch in scripts/build_cal.sh).
        env:
          JARVIS_CAL_OFFLINE: "0"
        run: task build

      - name: Run BATS tests
        run: bats tests/

      - name: ShellCheck
        run: shellcheck lib/**/*.sh cmds/**/*.sh

      - name: Rust unit tests
        run: cargo test --manifest-path jarvis-cal/Cargo.toml
