version: '3'

vars:
  FLAGS:
    - {name: in, type: string, desc: "Delay (e.g. 10s, 5m, 2h, 1d)",
       pattern: "^[0-9]+[smhd]$", group: when, exclusive: true}
    - {name: at, type: string, desc: "Absolute time (HH:MM 24h or 'YYYY-MM-DD HH:MM')"}
    - {name: repeat, type: string, desc: "Recurring cadence: daily | weekly | weekdays | weekends | <day-list> | <duration>"}
    - {name: until, type: string, desc: "Stop recurring after this date (YYYY-MM-DD)",
       pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"}
    - {name: count, type: string, desc: "Stop after N fires",
       pattern: "^[0-9]+$"}
    - {name: via, type: string, default: "local",
       desc: "Comma-separated channels (local,gotify,slack)"}

tasks:
  default:
    desc: "Schedule a reminder"
    summary: |
      Schedule a one-shot or recurring reminder. Provide --in or --at for a
      one-shot. Add --repeat (with --at HH:MM for anchored cadences) for
      recurring. Default channel is local desktop notification (osascript on
      macOS, notify-send on Linux). Add --via gotify,slack to fan out (each
      channel needs its own [notify.<channel>] block in config.toml).

      Examples:
        jarvis remind "stand up" --in 10m
        jarvis remind "1:1 with sam" --at 13:30 --via slack
        jarvis remind "deploy check" --at "2026-04-27 09:00"
        jarvis remind "standup" --repeat daily    --at 09:00
        jarvis remind "review"  --repeat fri      --at 17:00
        jarvis remind "drink water" --repeat 2h
        jarvis remind "1:1 sam" --repeat mon,wed --at 14:00 --until 2026-12-31
        jarvis remind "ship reminder" --repeat daily --at 09:00 --count 5
    vars:
      FLAGS:
        - {name: in, type: string, desc: "Delay (e.g. 10s, 5m, 2h, 1d)",
           pattern: "^[0-9]+[smhd]$", group: when, exclusive: true}
        - {name: at, type: string, desc: "Absolute time (HH:MM 24h or 'YYYY-MM-DD HH:MM')"}
        - {name: repeat, type: string, desc: "Recurring cadence: daily | weekly | weekdays | weekends | <day-list> | <duration>"}
        - {name: until, type: string, desc: "Stop recurring after this date (YYYY-MM-DD)",
           pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"}
        - {name: count, type: string, desc: "Stop after N fires",
           pattern: "^[0-9]+$"}
        - {name: via, type: string, default: "local",
           desc: "Comma-separated channels (local,gotify,slack)"}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"

  cancel:
    desc: "Cancel a scheduled reminder by slug"
    summary: |
      Remove a reminder file from the current profile. Use `jarvis remind
      list` to see available slugs.

      Examples:
        jarvis remind cancel ping-2026-04-26-1410
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"

  dryrun:
    desc: "Fire a scheduled reminder right now (channel-config debugging)"
    summary: |
      Look up the reminder by slug and dispatch its channels (via, message)
      immediately — bypassing the trigger_at + scheduler. Useful when wiring
      up gotify/slack/email and you want to confirm the channel works
      without waiting for the next tick.

      Does NOT advance the reminder's schedule, NOT update fire_count,
      NOT mark it delivered. The on-disk reminder is unchanged.

      Examples:
        jarvis remind dryrun standup
        jarvis remind dryrun --profile work morning-coffee
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"

  tick:
    desc: "Fire any due reminders (called by the scheduler)"
    summary: |
      Scan every profile under $JARVIS_HOME, dispatch any reminders whose
      trigger_at <= now, advance recurring schedules, and append a
      heartbeat row to the per-profile delivery log so `doctor` can detect
      a silent scheduler. Per-profile flock prevents concurrent ticks from
      double-firing.

      Hidden from `--help` because end-users don't run it directly — cron or
      systemd does. Run manually only when debugging the scheduler.
    vars:
      HIDDEN: true
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"

  install:
    desc: "Install the reminder scheduler (cron or systemd)"
    summary: |
      Install a recurring scheduler that runs `jarvis remind tick` every
      minute. Defaults to cron; use `--backend systemd` for a systemd
      user-timer instead. Backend resolves: --backend arg > `[scheduler]
      backend` in config.toml > "cron".

      Idempotent — installing twice is a no-op. Use `jarvis remind
      uninstall` to remove.

      Examples:
        jarvis remind install
        jarvis remind install --backend systemd
    vars:
      FLAGS:
        - {name: backend, type: string,
           desc: "Override backend: cron | systemd"}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"

  uninstall:
    desc: "Uninstall the reminder scheduler"
    summary: |
      Remove the scheduler installed by `jarvis remind install`. Backend
      resolution mirrors install. Idempotent — exits 0 if nothing to
      remove.

      Examples:
        jarvis remind uninstall
        jarvis remind uninstall --backend systemd
    vars:
      FLAGS:
        - {name: backend, type: string,
           desc: "Override backend: cron | systemd"}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"

  list:
    desc: "List scheduled reminders"
    summary: |
      Show pending + active reminders for the current profile (or all
      profiles with --all-profiles). Sorted by next trigger.

      Examples:
        jarvis remind list
        jarvis remind list --all-profiles
        jarvis remind list --json
    vars:
      FLAGS:
        - {name: all-profiles, type: bool, desc: "Include reminders from every profile"}
        - {name: json, type: bool, desc: "Emit JSON",
           group: output, exclusive: true}
        - {name: yaml, type: bool, desc: "Emit YAML",
           group: output, exclusive: true}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"
